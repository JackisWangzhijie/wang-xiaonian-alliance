# Kimi 双分身同步配置文件
# 用于 Windows PC 和 Android Termux 之间的记忆和技能同步

[SYNC]
# 同步仓库地址（需要手动创建并配置）
repo_url = https://github.com/JackisWangzhijie/wang-xiaonian-alliance.git

# 设备标识
# 请将此文件中的 device_id 修改为唯一标识
# Windows PC: device_id = windows-pc
# Termux: device_id = termux-mobile
device_id = windows-pc

# 同步模式
# realtime: 文件变更立即同步（需要后台进程）
# scheduled: 定时同步（推荐）
# manual: 仅手动同步
sync_mode = scheduled

# 定时同步间隔（分钟）
# 建议：skills 每 30 分钟，memory 每 60 分钟
sync_interval_skills = 30
sync_interval_memory = 60

[SYNC_ITEMS]
# 需要同步的内容
skills = true
memory = true
tools = true
scripts = true

[MERGE_STRATEGY]
# 冲突解决策略
# newest: 保留最新版本（默认）
# append: 追加内容（适用于 memory）
# manual: 手动解决
skills_strategy = newest
memory_strategy = append
tools_strategy = newest

[EXCLUDE]
# 不同步的文件模式
# 每行一个模式，支持通配符
patterns = 
    *.tmp
    *.log
    __pycache__/
    .DS_Store
    *.pyc
    .env
    
[NOTIFICATION]
# 同步完成/失败时发送通知
enabled = true
on_success = false
on_conflict = true
on_error = true

[LOG]
# 日志设置
level = INFO
file = sync/sync.log
max_size = 10MB
keep_days = 7
