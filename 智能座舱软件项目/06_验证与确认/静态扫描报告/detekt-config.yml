# Detekt Configuration for 智能座舱主交互系统
# Project: cockpit-main-interaction
# Version: 1.0.0
# Created: 2026-03-03
# 配置说明: 本配置针对汽车软件质量标准优化

build:
  maxIssues: 50  # 最大允许问题数，超过则构建失败
  excludeCorrectable: false
  weights:
    # 不同严重级别问题的权重配置
    complexity: 2
    LongParameterList: 1
    style: 1
    comments: 0

config:
  validation: true
  warningsAsErrors: false
  checkExhaustiveness: false

processors:
  active: true
  exclude:
    - 'DetektProgressListener'
  # 处理器输出配置
  - 'FunctionCountProcessor'
  - 'PropertyCountProcessor'
  - 'ClassCountProcessor'
  - 'PackageCountProcessor'
  - 'KtFileCountProcessor'

console-reports:
  active: true
  exclude:
    - 'ProjectStatisticsReport'
    - 'ComplexityReport'
    - 'NotificationReport'
    - 'FindingsReport'
    - 'FileBasedFindingsReport'
  include:
    - 'LiteFindingsReport'

output-reports:
  active: true
  exclude:
    # 默认启用 XML, HTML, MD, SARIF 格式
  include:
    - 'XmlOutputReport'
    - 'HtmlOutputReport'
    - 'MdOutputReport'
    - 'SarifOutputReport'

# ============================================================================
# 复杂度规则 (Complexity)
# ============================================================================
complexity:
  active: true
  
  # 复杂条件表达式
  ComplexCondition:
    active: true
    threshold: 4  # 条件复杂度阈值

  # 复杂接口
  ComplexInterface:
    active: true
    threshold: 10  # 接口成员数量阈值
    includeStaticDeclarations: false
    includePrivateDeclarations: false

  # 圈复杂度过高方法
  CyclomaticComplexMethod:
    active: true
    threshold: 15  # 圈复杂度阈值 (汽车软件建议 ≤15)
    ignoreSingleWhenExpression: false
    ignoreSimpleWhenEntries: false
    ignoreNestingFunctions: false
    nestingFunctions:
      - 'also'
      - 'apply'
      - 'forEach'
      - 'isNotNull'
      - 'ifNull'
      - 'let'
      - 'run'
      - 'use'
      - 'with'

  # 大类检查
  LargeClass:
    active: true
    threshold: 150  # 类最大行数 (汽车软件建议 ≤150)

  # 长方法检查
  LongMethod:
    active: true
    threshold: 60  # 方法最大行数

  # 长参数列表
  LongParameterList:
    active: true
    functionThreshold: 6   # 函数参数最大数量
    constructorThreshold: 7  # 构造函数参数最大数量
    ignoreDefaultParameters: true
    ignoreDataClasses: true
    ignoreAnnotatedParameter: []

  # 方法过多
  TooManyFunctions:
    active: true
    excludes: ['**/test/**', '**/androidTest/**', '**/*Test.kt']
    thresholdInFiles: 11     # 文件中函数数量阈值
    thresholdInClasses: 11   # 类中函数数量阈值
    thresholdInInterfaces: 11  # 接口中函数数量阈值
    thresholdInObjects: 11   # 对象中函数数量阈值
    thresholdInEnums: 11     # 枚举中函数数量阈值
    ignoreDeprecated: false
    ignorePrivate: false
    ignoreOverridden: false

  # 嵌套块深度
  NestedBlockDepth:
    active: true
    threshold: 4  # 嵌套深度阈值

  # 字符串嵌套块
  NestedScopeFunctions:
    active: true
    threshold: 1
    functions:
      - 'kotlin.apply'
      - 'kotlin.run'
      - 'kotlin.with'
      - 'kotlin.let'
      - 'kotlin.also'

  # 高复杂度方法
  ReplaceSafeCallChainWithRun:
    active: false

  # 协程复杂度
  SuspendFunWithCoroutineScopeReceiver:
    active: true

  # 协程Flow检查
  SuspendFunWithFlowReturnType:
    active: true

# ============================================================================
# 协程规则 (Coroutines)
# ============================================================================
coroutines:
  active: true
  
  # 全局Scope使用
  GlobalCoroutineUsage:
    active: true  # 汽车软件中应避免全局Scope

  # 不安全的协程构造器
  InjectDispatcher:
    active: true
    dispatcherNames:
      - 'IO'
      - 'Default'
      - 'Unconfined'

  # 内存泄漏风险
  RedundantSuspendModifier:
    active: true

  # 睡眠函数调用
  SleepInsteadOfDelay:
    active: true

  # 挂起函数使用检查
  SuspendFunWithCoroutineScopeReceiver:
    active: true

  # Flow返回类型检查
  SuspendFunWithFlowReturnType:
    active: true

# ============================================================================
# 空安全规则 (Empty Blocks)
# ============================================================================
empty-blocks:
  active: true
  
  EmptyCatchBlock:
    active: true
    allowedExceptionNameRegex: "^(_|(ignore|expected).*)"
  
  EmptyClassBlock:
    active: true
  
  EmptyDefaultConstructor:
    active: true
  
  EmptyDoWhileBlock:
    active: true
  
  EmptyElseBlock:
    active: true
  
  EmptyFinallyBlock:
    active: true
  
  EmptyForBlock:
    active: true
  
  EmptyFunctionBlock:
    active: true
    ignoreOverridden: false
  
  EmptyIfBlock:
    active: true
  
  EmptyInitBlock:
    active: true
  
  EmptyKtFile:
    active: true
  
  EmptySecondaryConstructor:
    active: true
  
  EmptyTryBlock:
    active: true
  
  EmptyWhenBlock:
    active: true
  
  EmptyWhileBlock:
    active: true

# ============================================================================
# 异常规则 (Exceptions)
# ============================================================================
exceptions:
  active: true
  
  ExceptionRaisedInUnexpectedLocation:
    active: true
    methodNames:
      - 'equals'
      - 'finalize'
      - 'hashCode'
      - 'toString'

  InstanceOfCheckForException:
    active: true
    excludes: ['**/test/**', '**/androidTest/**', '**/*Test.kt']

  NotImplementedDeclaration:
    active: true

  ObjectExtendsThrowable:
    active: true  # 汽车软件中应避免自定义异常对象

  PrintStackTrace:
    active: true  # 应使用日志框架而非printStackTrace

  RethrowCaughtException:
    active: true

  ReturnFromFinally:
    active: true
    ignoreLabeled: false

  SwallowedException:
    active: true
    ignoredExceptionTypes:
      - 'InterruptedException'
      - 'MalformedURLException'
      - 'NumberFormatException'
      - 'ParseException'
    allowedExceptionNameRegex: "^(_|(ignore|expected).*)"

  ThrowingExceptionFromFinally:
    active: true

  ThrowingExceptionInMain:
    active: true

  ThrowingExceptionsWithoutMessageOrCause:
    active: true
    excludes: ['**/test/**', '**/androidTest/**', '**/*Test.kt']
    exceptions:
      - 'ArrayIndexOutOfBoundsException'
      - 'Error'
      - 'Exception'
      - 'IllegalArgumentException'
      - 'IllegalMonitorStateException'
      - 'IllegalStateException'
      - 'IndexOutOfBoundsException'
      - 'NullPointerException'
      - 'RuntimeException'
      - 'Throwable'

  ThrowingNewInstanceOfSameException:
    active: true

  TooGenericExceptionCaught:
    active: true
    excludes: ['**/test/**', '**/androidTest/**', '**/*Test.kt']
    exceptionNames:
      - 'ArrayIndexOutOfBoundsException'
      - 'Error'
      - 'Exception'
      - 'IllegalMonitorStateException'
      - 'IndexOutOfBoundsException'
      - 'NullPointerException'
      - 'RuntimeException'
      - 'Throwable'
    allowedExceptionNameRegex: "^(_|(ignore|expected).*)"

  TooGenericExceptionThrown:
    active: true
    exceptionNames:
      - 'Error'
      - 'Exception'
      - 'RuntimeException'
      - 'Throwable'

# ============================================================================
# 命名规则 (Naming)
# ============================================================================
naming:
  active: true
  
  BooleanPropertyNaming:
    active: true
    allowedPattern: '^(is|has|are|should|can|was|will)'

  ClassNaming:
    active: true
    classPattern: '[A-Z$][a-zA-Z0-9$]*'

  ConstructorParameterNaming:
    active: true
    parameterPattern: '[a-z][A-Za-z0-9]*'
    privateParameterPattern: '[a-z][A-Za-z0-9]*'
    excludeClassPattern: '$^'

  EnumNaming:
    active: true
    enumEntryPattern: '^[A-Z][_a-zA-Z0-9]*'

  ForbiddenClassName:
    active: true
    forbiddenName: []

  FunctionMaxLength:
    active: true
    maximumFunctionNameLength: 50

  FunctionMinLength:
    active: true
    minimumFunctionNameLength: 3

  FunctionNaming:
    active: true
    excludes: ['**/test/**', '**/androidTest/**', '**/*Test.kt']
    functionPattern: '[a-z][a-zA-Z0-9]*'
    excludeClassPattern: '$^'

  FunctionParameterNaming:
    active: true
    parameterPattern: '[a-z][A-Za-z0-9]*'
    excludeClassPattern: '$^'

  InvalidPackageDeclaration:
    active: true
    rootPackage: 'com.cockpit.interaction'

  LambdaParameterNaming:
    active: true
    parameterPattern: '[a-z][A-Za-z0-9]*|_'

  MatchingDeclarationName:
    active: true
    mustBeFirst: true

  NoNameShadowing:
    active: true

  NonBooleanPropertyPrefixedWithIs:
    active: true

  ObjectPropertyNaming:
    active: true
    constantPattern: '[A-Z][_A-Z0-9]*'
    propertyPattern: '[A-Za-z][_A-Za-z0-9]*'
    privatePropertyPattern: '(_)?[A-Za-z][_A-Za-z0-9]*'

  PackageNaming:
    active: true
    packagePattern: '[a-z]+(\.[a-z][A-Za-z0-9]*)*'

  TopLevelPropertyNaming:
    active: true
    constantPattern: '[A-Z][_A-Z0-9]*'
    propertyPattern: '[A-Za-z][_A-Za-z0-9]*'
    privatePropertyPattern: '(_)?[A-Za-z][_A-Za-z0-9]*'

  VariableMaxLength:
    active: true
    maximumVariableNameLength: 64

  VariableMinLength:
    active: true
    minimumVariableNameLength: 1

  VariableNaming:
    active: true
    variablePattern: '[a-z][A-Za-z0-9]*'
    privateVariablePattern: '(_)?[a-z][A-Za-z0-9]*'
    excludeClassPattern: '$^'

# ============================================================================
# 性能规则 (Performance)
# ============================================================================
performance:
  active: true
  
  ArrayPrimitive:
    active: true  # 建议使用专用数组类

  CouldBeSequence:
    active: true
    threshold: 3

  ForEachOnRange:
    active: true
    excludes: ['**/test/**', '**/androidTest/**', '**/*Test.kt']

  SpreadOperator:
    active: true
    excludes: ['**/test/**', '**/androidTest/**', '**/*Test.kt']

  UnnecessaryTemporaryInstantiation:
    active: true

# ============================================================================
# 潜在缺陷规则 (Potential Bugs)
# ============================================================================
potential-bugs:
  active: true
  
  AvoidReferentialEquality:
    active: true
    forbiddenTypePatterns:
      - 'kotlin.String'
      - 'kotlin.Int'
      - 'kotlin.Long'
      - 'kotlin.Double'
      - 'kotlin.Float'

  CastToNullableType:
    active: true

  Deprecation:
    active: true

  DontDowncastCollectionTypes:
    active: true

  DoubleMutabilityForCollection:
    active: true
    mutableTypes:
      - 'kotlin.collections.MutableList'
      - 'kotlin.collections.MutableMap'
      - 'kotlin.collections.MutableSet'
      - 'java.util.ArrayList'
      - 'java.util.LinkedHashSet'
      - 'java.util.HashSet'
      - 'java.util.LinkedHashMap'
      - 'java.util.HashMap'

  EqualsAlwaysReturnsTrueOrFalse:
    active: true

  EqualsWithHashCodeExist:
    active: true

  ExplicitGarbageCollectionCall:
    active: true  # 不应显式调用GC

  HasPlatformType:
    active: true

  IgnoredReturnValue:
    active: true
    restrictToAnnotatedMethods: true
    returnValueAnnotations:
      - '*.CheckResult'
      - '*.CheckReturnValue'
    ignoreReturnValueAnnotations: []

  ImplicitDefaultLocale:
    active: true

  ImplicitUnitReturnType:
    active: true
    allowExplicitReturnType: true

  InvalidRange:
    active: true

  IteratorHasNextCallsNextMethod:
    active: true

  IteratorNotThrowingNoSuchElementException:
    active: true

  LateinitUsage:
    active: true
    excludes: ['**/test/**', '**/androidTest/**', '**/*Test.kt']
    excludeAnnotatedProperties: []
    ignoreOnClassesPattern: ''

  MapGetWithNotNullAssertionOperator:
    active: true

  MissingPackageDeclaration:
    active: true
    excludes: ['**/*.kts']

  MissingWhenCase:
    active: true
    allowElseExpression: false  # when语句应覆盖所有分支

  NullCheckOnMutableProperty:
    active: true

  NullableToStringCall:
    active: true

  RedundantElseInWhen:
    active: true

  UnconditionalJumpStatementInLoop:
    active: true

  UnnecessaryNotNullOperator:
    active: true

  UnnecessarySafeCall:
    active: true

  UnsafeCallOnNullableType:
    active: true  # 空指针安全检查 - 汽车软件关键

  UnsafeCast:
    active: true

  UselessPostfixExpression:
    active: true

  WrongEqualsTypeParameter:
    active: true

# ============================================================================
# 风格规则 (Style)
# ============================================================================
style:
  active: true
  
  CanBeNonNullable:
    active: true

  CascadingCallWrapping:
    active: true
    includeElvis: true

  ClassOrdering:
    active: true

  CollapsibleIfStatements:
    active: true

  DataClassShouldBeImmutable:
    active: true

  DataClassCopyFunctionUse:
    active: true

  DestructuringDeclarationWithTooManyEntries:
    active: true
    maxDestructuringEntries: 5

  EqualsNullCall:
    active: true

  EqualsOnSignature:
    active: true

  ExplicitCollectionElementAccessMethod:
    active: true

  ExplicitItLambdaParameter:
    active: true

  ExpressionBodySyntax:
    active: true
    includeLineWrapping: false

  ForbiddenComment:
    active: true
    values:
      - 'FIXME:'
      - 'STOPSHIP:'
      - '@author'
    allowedPatterns: ''

  ForbiddenImport:
    active: true
    imports: []
    forbiddenPatterns: ''

  ForbiddenMethodCall:
    active: true
    methods:
      - 'kotlin.io.println'
      - 'kotlin.io.print'
      - 'java.lang.Runtime.exec'
      - 'java.lang.Runtime.getRuntime'
      - 'kotlin.system.exitProcess'

  ForbiddenPublicDataClass:
    active: false

  ForbiddenSuppress:
    active: true
    rules: []

  ForbiddenVoid:
    active: true
    ignoreOverridden: false
    ignoreUsageInGenerics: false

  FunctionOnlyReturningConstant:
    active: true
    ignoreOverridableFunction: true
    excludedFunctions: 'describeContents'
    ignoreActualFunction: true

  LoopWithTooManyJumpStatements:
    active: true
    maxJumpCount: 1

  MagicNumber:
    active: true
    excludes: ['**/test/**', '**/androidTest/**', '**/*Test.kt']
    ignoreNumbers:
      - '-1'
      - '0'
      - '1'
      - '2'
      - '100'
      - '1000'
    ignoreHashCodeFunction: true
    ignorePropertyDeclaration: false
    ignoreLocalVariableDeclaration: false
    ignoreConstantDeclaration: true
    ignoreCompanionObjectPropertyDeclaration: true
    ignoreAnnotation: false
    ignoreNamedArgument: true
    ignoreEnums: false
    ignoreRanges: false
    ignoreExtensionFunctions: true

  MandatoryBracesLoops:
    active: true

  MaxLineLength:
    active: true
    maxLineLength: 120  # 行长度限制
    excludePackageStatements: true
    excludeImportStatements: true
    excludeCommentStatements: false
    excludeRawStrings: true

  MayBeConst:
    active: true

  ModifierOrder:
    active: true

  MultilineRawStringIndentation:
    active: true
    indentSize: 4

  NestedClassesVisibility:
    active: true

  NewLineAtEndOfFile:
    active: true

  NoTabs:
    active: true

  ObjectLiteralToLambda:
    active: true

  OptionalAbstractKeyword:
    active: true

  OptionalUnit:
    active: true

  OptionalWhenBraces:
    active: true

  PreferToOverPairSyntax:
    active: true

  ProtectedMemberInFinalClass:
    active: true

  RedundantExplicitType:
    active: true

  RedundantHigherOrderMapUsage:
    active: true

  RedundantVisibilityModifierRule:
    active: true

  ReturnCount:
    active: true
    max: 2
    excludedFunctions: 'equals'
    excludeLabeled: false
    excludeReturnFromLambda: true
    excludeGuardClauses: false

  SafeCast:
    active: true

  SerialVersionUIDInSerializableClass:
    active: true

  SpacingBetweenPackageAndImports:
    active: true

  ThrowsCount:
    active: true
    max: 2
    excludeGuardClauses: false

  TrailingWhitespace:
    active: true

  TrimMultilineRawString:
    active: true
    trimmingMethods:
      - 'trimIndent'
      - 'trimMargin'

  UnderscoresInNumericLiterals:
    active: true
    acceptableDecimalLength: 5
    acceptableFractionLength: 3
    acceptableLength: 4

  UnnecessaryAbstractClass:
    active: true

  UnnecessaryAnnotationUseSiteTarget:
    active: true

  UnnecessaryApply:
    active: true

  UnnecessaryFilter:
    active: true

  UnnecessaryInheritance:
    active: true

  UnnecessaryLet:
    active: true

  UnnecessaryParentheses:
    active: true
    allowForUnclearPrecedence: false

  UntilInsteadOfRangeTo:
    active: true

  UnusedImports:
    active: true

  UnusedParameter:
    active: true
    allowedNames: 'ignored|expected'

  UnusedPrivateClass:
    active: true

  UnusedPrivateMember:
    active: true
    allowedNames: '(_|ignored|expected|serialVersionUID)'

  UseAnyOrNoneInsteadOfFind:
    active: true

  UseArrayLiteralsInAnnotations:
    active: true

  UseCheckNotNull:
    active: true

  UseCheckOrError:
    active: true

  UseDataClass:
    active: true
    allowVars: false

  UseEmptyCounterpart:
    active: true

  UseIfEmptyOrIfBlank:
    active: true

  UseIfInsteadOfWhen:
    active: true

  UseIsNullOrEmpty:
    active: true

  UseOrEmpty:
    active: true

  UseRequire:
    active: true

  UseRequireNotNull:
    active: true

  UseOrInsteadOfExtend:
    active: true

  UseSumOfInsteadOfFlatMapSize:
    active: true

  UselessCallOnNotNull:
    active: true

  UtilityClassWithPublicConstructor:
    active: true

  VarCouldBeVal:
    active: true

  WildcardImport:
    active: true
    excludeImports:
      - 'java.util.*'
      - 'kotlinx.android.synthetic.*'

# ============================================================================
# 注释规则 (Comments)
# ============================================================================
comments:
  active: true
  
  AbsentOrWrongFileLicense:
    active: false
    licenseTemplateFile: 'license.template'
    licenseTemplateIsRegex: false

  CommentOverPrivateFunction:
    active: false

  CommentOverPrivateProperty:
    active: false

  DeprecatedBlockTag:
    active: true

  EndOfSentenceFormat:
    active: true
    endOfSentenceFormat: '([.?!][ \t\n\r\\<])|([.?!]$)'

  KDocReferencesNonPublicProperty:
    active: true
    excludes: ['**/test/**', '**/androidTest/**', '**/*Test.kt']

  OutdatedDocumentation:
    active: true
    matchTypeParameters: true
    matchDeclarationsOrder: true
    allowParamOnConstructorProperties: false

  UndocumentedPublicClass:
    active: true
    excludes: ['**/test/**', '**/androidTest/**', '**/*Test.kt']
    searchInNestedClass: true
    searchInInnerClass: true
    searchInInnerObject: true
