# SonarQube Configuration for 智能座舱主交互系统
# Project: cockpit-main-interaction
# Version: 1.0.0
# Created: 2026-03-03

# ============================================================
# 1. 项目基础配置
# ============================================================

# 项目唯一标识符
sonar.projectKey=cockpit-main-interaction

# 项目名称 (显示用)
sonar.projectName=智能座舱主交互系统

# 项目描述
sonar.projectDescription=智能座舱主交互系统 - 代码质量静态分析配置

# 项目版本
sonar.projectVersion=1.0.0

# ============================================================
# 2. 源码路径配置
# ============================================================

# 源码根目录
sonar.sources=app/src/main/java,app/src/main/kotlin,domain/src/main/java,domain/src/main/kotlin,data/src/main/java,data/src/main/kotlin,common/src/main/java,common/src/main/kotlin

# 测试代码路径
sonar.tests=app/src/test,app/src/androidTest,domain/src/test,data/src/test,common/src/test

# 二进制文件路径 (用于字节码分析)
sonar.java.binaries=app/build/intermediates/javac,domain/build/intermediates/javac,data/build/intermediates/javac,common/build/intermediates/javac
sonar.java.libraries=app/build/libs,domain/build/libs,data/build/libs,common/build/libs

# ============================================================
# 3. 语言与编码配置
# ============================================================

# 主语言设置
sonar.language=kotlin

# 文件编码
sonar.sourceEncoding=UTF-8

# 源码Java版本
sonar.java.source=17

# 目标Java版本
sonar.java.target=17

# ============================================================
# 4. 代码排除规则
# ============================================================

# 排除自动生成的代码
sonar.exclusions=\
  **/generated/**,\
  **/build/**,\
  **/.gradle/**,\
  **/R.java,\
  **/R.kt,\
  **/BuildConfig.java,\
  **/BuildConfig.kt,\
  **/Manifest.java,\
  **/*Test*/**,\
  **/*test*/**,\
  **/*Test*.java,\
  **/*Test*.kt,\
  **/androidTest/**,\
  **/test/**,\
  **/mock/**,\
  **/stub/**,\
  **/databinding/**,\
  **/viewbinding/**,\
  **/hilt_aggregated_deps/**,\
  **/hilt/**

# 排除测试代码重复度检查
sonar.cpd.exclusions=\
  **/*Test*/**,\
  **/test/**,\
  **/androidTest/**

# ============================================================
# 5. 测试与覆盖率配置
# ============================================================

# 覆盖率报告路径
sonar.coverage.jacoco.xmlReportPaths=\
  app/build/reports/jacoco/jacocoTestReport/jacocoTestReport.xml,\
  domain/build/reports/jacoco/jacocoTestReport/jacocoTestReport.xml,\
  data/build/reports/jacoco/jacocoTestReport/jacocoTestReport.xml,\
  common/build/reports/jacoco/jacocoTestReport/jacocoTestReport.xml,\
  build/reports/jacoco/jacocoTestReport/jacocoTestReport.xml

# 覆盖率排除项
sonar.coverage.exclusions=\
  **/di/**,\
  **/dagger/**,\
  **/hilt/**,\
  **/model/**,\
  **/entity/**,\
  **/dto/**,\
  **/mapper/**,\
  **/extension/**,\
  **/util/**,\
  **/constants/**,\
  **/binding/**,\
  **/*Activity.kt,\
  **/*Fragment.kt,\
  **/*Adapter.kt,\
  **/*ViewHolder.kt

# ============================================================
# 6. Kotlin专项配置
# ============================================================

# Detekt报告集成
sonar.kotlin.detekt.reportPaths=build/reports/detekt/detekt.xml

# Android Lint报告集成
sonar.android.lint.report=app/build/reports/lint-results.xml

# Kotlin文件后缀
sonar.kotlin.file.suffixes=.kt,.kts

# ============================================================
# 7. 质量门禁配置 (Quality Gate)
# ============================================================

# 注意: 以下配置需在SonarQube服务器端的质量门禁中设置
# 此配置文件仅作说明用途

# 质量门禁阈值说明:
# - 阻塞问题 (Blocker Issues): 0
# - 严重问题 (Critical Issues): ≤5
# - 主要问题 (Major Issues): ≤50
# - 代码重复率 (Duplicated Lines): ≤3%
# - 技术债务 (Technical Debt): ≤5天
# - 代码覆盖率 (Coverage): ≥80%
# - 单元测试成功率 (Test Success): 100%

# ============================================================
# 8. 规则集配置
# ============================================================

# Sonar way规则集 (基础)
# 扩展规则: sonar.kotlin.analysis.mode=detailed

# 自定义规则配置
# sonar.kotlin.customRules=custom-rules.jar

# ============================================================
# 9. 问题严重性覆盖
# ============================================================

# 提升特定规则严重性 (汽车软件安全要求)
# 空指针检查 -> 阻塞级
sonar.issue.enforce.multiple=kotlin:S2259,kotlin:S3655,kotlin:S2637

# 硬编码凭证 -> 阻塞级
sonar.issue.enforce.multiple=kotlin:S2068

# 资源泄漏 -> 严重级
sonar.issue.enforce.multiple=kotlin:S2095

# SQL注入风险 -> 阻塞级
sonar.issue.enforce.multiple=kotlin:S2077

# ============================================================
# 10. 报告与通知配置
# ============================================================

# 分析报告等待超时 (秒)
sonar.ws.timeout=600

# 详细日志输出
sonar.verbose=false

# 分析报告路径
sonar.working.directory=.sonar

# ============================================================
# 11. CI/CD集成配置
# ============================================================

# GitLab CI配置
# sonar.gitlab.project_id=$CI_PROJECT_ID
# sonar.gitlab.commit_sha=$CI_COMMIT_SHA
# sonar.gitlab.ref_name=$CI_COMMIT_REF_NAME
# sonar.gitlab.user_email=$GITLAB_USER_EMAIL

# Jenkins配置
# sonar.jenkins.pipeline=true

# ============================================================
# 12. 其他配置
# ============================================================

# SCM信息
sonar.scm.provider=git
sonar.scm.forceReloadAll=false

# 分支分析配置
sonar.branch.name=${env.SONAR_BRANCH_NAME}
sonar.branch.target=${env.SONAR_BRANCH_TARGET}

# 拉取请求分析
sonar.pullrequest.key=${env.SONAR_PULL_REQUEST_KEY}
sonar.pullrequest.branch=${env.SONAR_PULL_REQUEST_BRANCH}
sonar.pullrequest.base=${env.SONAR_PULL_REQUEST_BASE}

# ============================================================
# 使用说明
# ============================================================
# 1. 将本文件放置于项目根目录
# 2. 运行: sonar-scanner 或 ./gradlew sonarqube
# 3. 查看报告: http://sonarqube-server/dashboard?id=cockpit-main-interaction
# ============================================================
